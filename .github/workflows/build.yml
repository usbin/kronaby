name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'project.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'project.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Convert app icon to RGB (actool requires non-indexed PNG)
        run: sips -s format png -s formatOptions best Sources/Assets.xcassets/AppIcon.appiconset/icon.png --out Sources/Assets.xcassets/AppIcon.appiconset/icon.png

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install iOS Simulator Runtime
        run: xcodebuild -downloadPlatform iOS || true

      - name: Build for device (unsigned)
        run: |
          xcodebuild build \
            -project Keepnaby.xcodeproj \
            -scheme Keepnaby \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Keepnaby.app Payload/
          zip -r Keepnaby.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Keepnaby-ipa
          path: Keepnaby.ipa
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          body: "Automated build from commit ${{ github.sha }}"
          files: Keepnaby.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old auto-builds (keep latest 1, preserve manual tags)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tags: true
          delete_tag_pattern: "build-"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
